name: Job Alert Automation

on:
  schedule:
    # Runs every 4 hours. You can adjust this cron schedule.
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the updated JSON file back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Job Scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: npm start

      - name: Commit updated state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add seen_jobs.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update seen jobs state" && git push)
